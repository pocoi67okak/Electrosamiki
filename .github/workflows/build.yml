name: Build Plugin

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: Electrosamiki
          path: target/Electrosamiki-*.jar
